<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RAG Chatbot - Groq Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            height: 90vh;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
            }
        }

        .panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            height: 60px;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            text-align: center;
            display: block;
            margin-bottom: 10px;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .file-name {
            font-size: 12px;
            color: #666;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background: #e0e0e0;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .documents-list {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }

        .document-item {
            background: #f5f5f5;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 13px;
            border-left: 4px solid #667eea;
        }

        .document-item strong {
            color: #333;
            display: block;
        }

        .document-item small {
            color: #999;
            display: block;
            margin-top: 5px;
        }

        .delete-btn {
            margin-top: 8px;
            font-size: 12px;
            padding: 6px;
            background: #dc3545;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            max-width: 90%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            text-align: right;
        }

        .message.assistant {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            text-align: center;
            font-size: 12px;
            max-width: 100%;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            margin-bottom: 0;
        }

        .input-area button {
            flex: 0 0 100px;
            margin-bottom: 0;
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            text-align: center;
        }

        .status.connected {
            color: #28a745;
            background: #d4edda;
        }

        .status.error {
            color: #dc3545;
            background: #f8d7da;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 5px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            animation: progress 1.5s ease-in-out infinite;
        }

        @keyframes progress {
            0%, 100% { width: 0%; }
            50% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel: Documents -->
        <div class="panel">
            <div class="header">
                <h1>📚 Documents</h1>
                <p>Upload and manage documents</p>
            </div>
            <div class="content">
                <div class="section">
                    <h2>Upload Document</h2>
                    
                    <div class="tab-buttons">
                        <button class="tab-btn active" onclick="switchTab('file')">📁 Upload File</button>
                        <button class="tab-btn" onclick="switchTab('text')">📝 Text Input</button>
                    </div>

                    <!-- File Upload Tab -->
                    <div id="file-tab" class="tab-content active">
                        <div class="file-input-wrapper">
                            <label class="file-input-label" for="fileInput">
                                📤 Choose File (PDF, Word, Text)
                            </label>
                            <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" onchange="handleFileSelect(event)" />
                        </div>
                        <div id="fileName" class="file-name" style="display: none;"></div>
                        <button onclick="uploadFile()" id="uploadFileBtn">📤 Upload & Process</button>
                    </div>

                    <!-- Text Input Tab -->
                    <div id="text-tab" class="tab-content">
                        <input type="text" id="docTitle" placeholder="Document title..." />
                        <textarea id="docContent" placeholder="Paste your text here..."></textarea>
                        <button onclick="uploadText()">📤 Upload Text</button>
                    </div>
                </div>

                <div class="section">
                    <h2>Your Documents</h2>
                    <div class="documents-list" id="documentsList">
                        <p style="color: #999; text-align: center;">Loading...</p>
                    </div>
                </div>

                <div class="status" id="status">
                    🔄 Initializing...
                </div>
            </div>
        </div>

        <!-- Right Panel: Chat -->
        <div class="panel">
            <div class="header">
                <h1>🤖 Chat</h1>
                <p>Ask questions about your documents</p>
            </div>
            <div class="content">
                <div class="chat-container">
                    <div class="messages" id="messages"></div>
                    <div class="input-area">
                        <input type="text" id="queryInput" placeholder="Ask a question..." onkeypress="handleKeyPress(event)" />
                        <button onclick="sendQuery()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let conversationId = 'chat-' + Date.now();
        let selectedFile = null;

        document.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, initializing...');
            loadDocuments();
            updateStatus('Connected ✅', 'connected');
            addMessage('Welcome! Upload documents (PDF, Word, or text) and ask questions about them.', 'system');
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                const fileNameDiv = document.getElementById('fileName');
                fileNameDiv.textContent = `📄 ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(2)} KB)`;
                fileNameDiv.style.display = 'block';
            }
        }

        async function uploadFile() {
            if (!selectedFile) {
                alert('Please select a file');
                return;
            }

            try {
                const uploadBtn = document.getElementById('uploadFileBtn');
                uploadBtn.disabled = true;
                uploadBtn.textContent = '⏳ Processing...';
                updateStatus('Processing file...', '');

                const formData = new FormData();
                formData.append('file', selectedFile);

                const response = await fetch(`${API_URL}/documents`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                addMessage(`✅ File "${data.document.title}" uploaded and processed!`, 'system');
                addMessage(`📊 Stats: ${data.stats.wordCount} words, ${data.stats.contentLength} characters`, 'system');
                
                document.getElementById('fileInput').value = '';
                document.getElementById('fileName').style.display = 'none';
                selectedFile = null;
                
                await loadDocuments();
                updateStatus('Connected ✅', 'connected');
                uploadBtn.textContent = '📤 Upload & Process';
                uploadBtn.disabled = false;
            } catch (error) {
                console.error('Upload error:', error);
                addMessage(`❌ Error: ${error.message}`, 'system');
                updateStatus('Error uploading', 'error');
                document.getElementById('uploadFileBtn').disabled = false;
                document.getElementById('uploadFileBtn').textContent = '📤 Upload & Process';
            }
        }

        async function uploadText() {
            const title = document.getElementById('docTitle').value.trim();
            const content = document.getElementById('docContent').value.trim();

            if (!title || !content) {
                alert('Please fill in both title and content');
                return;
            }

            try {
                updateStatus('Uploading...', '');
                
                const response = await fetch(`${API_URL}/documents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                if (!response.ok) throw new Error('Upload failed');
                const data = await response.json();

                document.getElementById('docTitle').value = '';
                document.getElementById('docContent').value = '';
                addMessage(`✅ Document "${title}" uploaded!`, 'system');
                await loadDocuments();
                updateStatus('Connected ✅', 'connected');
            } catch (error) {
                console.error('Upload error:', error);
                addMessage(`❌ Error: ${error.message}`, 'system');
                updateStatus('Error uploading', 'error');
            }
        }

        async function loadDocuments() {
            try {
                const response = await fetch(`${API_URL}/documents`);
                const data = await response.json();
                const docsList = document.getElementById('documentsList');

                if (!data.documents || data.documents.length === 0) {
                    docsList.innerHTML = '<p style="color: #999; text-align: center;">No documents yet</p>';
                    return;
                }

                docsList.innerHTML = data.documents.map(doc => `
                    <div class="document-item">
                        <strong>📄 ${doc.title}</strong>
                        <small>${doc.content.substring(0, 50)}...</small>
                        <button class="delete-btn" onclick="deleteDocument('${doc.id}')">🗑️ Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        async function deleteDocument(id) {
            if (!confirm('Delete this document?')) return;
            try {
                const response = await fetch(`${API_URL}/documents/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Delete failed');
                await loadDocuments();
                addMessage('✅ Document deleted', 'system');
            } catch (error) {
                addMessage(`❌ Error: ${error.message}`, 'system');
            }
        }

        async function sendQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            addMessage(query, 'user');
            document.getElementById('queryInput').value = '';

            try {
                updateStatus('Thinking...', '');
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, conversationId })
                });

                if (!response.ok) throw new Error('Query failed');
                const data = await response.json();
                addMessage(data.response, 'assistant');
                updateStatus(`Connected ✅ • Model: ${data.model}`, 'connected');
            } catch (error) {
                addMessage(`❌ Error: ${error.message}. Make sure you have documents uploaded.`, 'system');
                updateStatus('Error', 'error');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendQuery();
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('messages');
            const msgEl = document.createElement('div');
            msgEl.className = `message ${sender}`;
            msgEl.textContent = text;
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateStatus(text, className) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = `status ${className}`;
        }
    </script>
</body>
</html>
